<!DOCTYPE html>
<html>
<body>

<h1>AI News System</h1>

{% for item in news %}

<div style="margin-bottom:20px;">
    <h3>[{{ item[3] }}]</h3>

    <a href="{{ item[1] }}" target="_blank">
        {{ item[0] }}
    </a>

    <p>{{ item[2] }}</p>

    <small>
        Published: {{ item[4] }} <br>
        Saved: {{ item[5] }}
    </small>
</div>

<hr>

{% endfor %}

</body>
</html>
