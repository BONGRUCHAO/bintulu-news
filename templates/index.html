<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bintulu News</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            padding: 20px;
        }
        .card {
            background: #222;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
        a {
            color: #4fc3f7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h2>Bintulu News</h2>

    {% for item in news %}
        <div class="card">
            <a href="{{ item.link }}" target="_blank">
                {{ item.title }}
            </a>
        </div>
    {% endfor %}

</body>
</html>
